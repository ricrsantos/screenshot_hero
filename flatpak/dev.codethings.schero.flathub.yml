app-id: dev.codethings.schero
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: screenshot-hero

finish-args:
  - --share=ipc
  - --device=dri
  - --socket=fallback-x11
  - --socket=wayland
  - --talk-name=org.freedesktop.portal.Screenshot
  - --talk-name=org.freedesktop.portal.Desktop
  - --filesystem=xdg-pictures:ro

modules:
  - name: screenshot-hero
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/screenshot-hero/cargo
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - install -Dm0644 cargo/config.toml .cargo/config.toml
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --bin screenshot-hero
      - install -Dm755 target/release/screenshot-hero ${FLATPAK_DEST}/bin/screenshot-hero
      - install -Dm0644 data/dev.codethings.schero.desktop ${FLATPAK_DEST}/share/applications/dev.codethings.schero.desktop
      - install -Dm0644 data/dev.codethings.schero.metainfo.xml ${FLATPAK_DEST}/share/metainfo/dev.codethings.schero.metainfo.xml
      - install -Dm0644 data/dev.codethings.schero.gschema.xml ${FLATPAK_DEST}/share/glib-2.0/schemas/dev.codethings.schero.gschema.xml
      - install -Dm0644 data/icons/hicolor/32x32/apps/com.screenshot_hero.ScreenshotHero.png ${FLATPAK_DEST}/share/icons/hicolor/32x32/apps/dev.codethings.schero.png
      - install -Dm0644 data/icons/hicolor/48x48/apps/com.screenshot_hero.ScreenshotHero.png ${FLATPAK_DEST}/share/icons/hicolor/48x48/apps/dev.codethings.schero.png
      - install -Dm0644 data/icons/hicolor/64x64/apps/com.screenshot_hero.ScreenshotHero.png ${FLATPAK_DEST}/share/icons/hicolor/64x64/apps/dev.codethings.schero.png
      - install -Dm0644 data/icons/hicolor/128x128/apps/com.screenshot_hero.ScreenshotHero.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/dev.codethings.schero.png
      - install -Dm0644 data/icons/hicolor/256x256/apps/com.screenshot_hero.ScreenshotHero.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/dev.codethings.schero.png
      - install -Dm0644 data/icons/hicolor/512x512/apps/com.screenshot_hero.ScreenshotHero.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/dev.codethings.schero.png
      - gtk4-update-icon-cache -q -t -f ${FLATPAK_DEST}/share/icons/hicolor || true
      - glib-compile-schemas ${FLATPAK_DEST}/share/glib-2.0/schemas/
    sources:
      - cargo-sources.json
      - type: git
        url: https://github.com/ricrsantos/screenshot_hero.git
        commit: d815a7c54547edd541da2b8f48326b1c69657ad0
