app-id: com.screenshot_hero.ScreenshotHero
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: screenshot-hero

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --talk-name=org.freedesktop.portal.Screenshot
  - --talk-name=org.freedesktop.portal.Desktop
  - --filesystem=xdg-pictures:ro

modules:
  - name: screenshot-hero
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/screenshot-hero/cargo
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - install -Dm0644 cargo/config .cargo/config.toml
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --bin screenshot-hero
      - install -Dm755 target/release/screenshot-hero ${FLATPAK_DEST}/bin/screenshot-hero
      - install -Dm0644 data/com.screenshot_hero.ScreenshotHero.gschema.xml ${FLATPAK_DEST}/share/glib-2.0/schemas/com.screenshot_hero.ScreenshotHero.gschema.xml
      - glib-compile-schemas ${FLATPAK_DEST}/share/glib-2.0/schemas/
    sources:
      - cargo-sources.json
      - type: dir
        path: ..
